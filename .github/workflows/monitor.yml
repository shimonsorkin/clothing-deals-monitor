name: clothing-deals-monitor

on:
  schedule:
    - cron: "*/15 * * * *"   # every ~15 min (GitHub may delay under load)
  workflow_dispatch:           # manual "Run workflow" button

concurrency:
  group: monitor
  cancel-in-progress: false

permissions:
  contents: write              # to commit state/ and docs/ back

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m monitor.run

      - name: Commit state + landing page
        if: always()
        run: |
          if [[ -n "$(git status --porcelain state docs)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state docs
            git commit -m "chore: refresh deals [skip ci]"
            git push
          else
            echo "nothing changed"
          fi
